name: Update CFTC COT Gold

on:
  workflow_dispatch:
  schedule:
    # CFTC publishes COT every Friday ~15:30 US Eastern (19:30 UTC EDT / 20:30 UTC EST).
    # 21:00 UTC gives a safety margin either way.
    - cron: "0 21 * * 5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cot-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch CFTC COT data and build dashboard
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m app.run_cot
      - name: Commit latest data and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/parsed/cot docs/cot
          git diff --cached --quiet || git commit -m "data: update CFTC COT gold report"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy GitHub Pages
        uses: actions/deploy-pages@v4

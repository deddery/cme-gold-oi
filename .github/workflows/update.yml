name: Update CME Gold Options
# nudge: re-trigger GitHub's workflow discovery

on:
  workflow_dispatch:
  push:
    paths:
      - "data/raw/**.pdf"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cme-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
      - name: Parse uploaded PDF, validate, and build dashboard
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m app.run
      - name: Commit latest data and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw data/parsed docs
          git diff --cached --quiet || git commit -m "data: update CME gold options"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy GitHub Pages
        uses: actions/deploy-pages@v4
